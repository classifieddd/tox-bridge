<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Tox Bridge — Communication chiffrée de bout en bout</title>
  <script src="https://cdn.tailwindcss.com">
  </script>
  <script>
    tailwind.config = {
      theme: {
        extend: {
          colors: {
            dark: { 50: '#f0f2f5', 100: '#d1d5db', 200: '#9ca3af', 300: '#6b7280', 400: '#4b5563', 500: '#374151', 600: '#1f2937', 700: '#111827', 800: '#0a0e17', 900: '#04060d' },
            tox: '#6ee7b7',
          },
          fontFamily: { sans: ['Inter', 'system-ui', 'sans-serif'], mono: ['JetBrains Mono', 'Fira Code', 'monospace'] },
        }
      }
    }
  </script>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
  <style>
    * { scroll-behavior: smooth; }
    body { background: #04060d; }
    .glow { box-shadow: 0 0 40px rgba(110, 231, 183, 0.08); }
    .gradient-text { background: linear-gradient(135deg, #6ee7b7, #34d399, #10b981); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
    .gradient-bg { background: linear-gradient(135deg, rgba(110, 231, 183, 0.05), rgba(16, 185, 129, 0.02)); }
    .card-hover { transition: all 0.3s ease; }
    .card-hover:hover { transform: translateY(-4px); box-shadow: 0 12px 40px rgba(110, 231, 183, 0.1); }
    .pulse-dot { animation: pulse 2s infinite; }
    @keyframes pulse { 0%, 100% { opacity: 1; } 50% { opacity: 0.4; } }
    .fade-in { animation: fadeIn 0.8s ease-out forwards; opacity: 0; }
    .fade-in-delay-1 { animation-delay: 0.1s; }
    .fade-in-delay-2 { animation-delay: 0.2s; }
    .fade-in-delay-3 { animation-delay: 0.3s; }
    @keyframes fadeIn { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }
    .step-line { position: absolute; left: 15px; top: 40px; bottom: -40px; width: 2px; background: linear-gradient(to bottom, rgba(110, 231, 183, 0.4), transparent); }
    ::-webkit-scrollbar { width: 6px; }
    ::-webkit-scrollbar-track { background: #0a0e17; }
    ::-webkit-scrollbar-thumb { background: #374151; border-radius: 3px; }
    ::-webkit-scrollbar-thumb:hover { background: #4b5563; }
  </style>
</head>
<body class="text-gray-100 font-sans antialiased">

  <div id="root"></div>

  <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

  <script type="text/babel">
    const { useState, useEffect, useRef } = React;

    // ---------- Components ----------

    function Nav({ onNav }) {
      const [scrolled, setScrolled] = useState(false);
      useEffect(() => {
        const handler = () => setScrolled(window.scrollY > 50);
        window.addEventListener('scroll', handler);
        return () => window.removeEventListener('scroll', handler);
      }, []);

      const links = [
        { label: 'Pourquoi', href: '#why' },
        { label: 'Comment', href: '#how' },
        { label: 'Fonctionnalités', href: '#features' },
        { label: 'Déploiement', href: '#deploy' },
      ];

      return (
        <nav className={`fixed top-0 left-0 right-0 z-50 transition-all duration-300 ${scrolled ? 'bg-dark-800/90 backdrop-blur-lg border-b border-dark-600/50' : 'bg-transparent'}`}>
          <div className="max-w-6xl mx-auto px-6 h-16 flex items-center justify-between">
            <span className="text-lg font-semibold tracking-tight">
              <span className="text-tox">⎔</span>{' '}
              <span className="gradient-text">Tox Bridge</span>
            </span>
            <div className="hidden md:flex items-center gap-8">
              {links.map(l => (
                <a key={l.href} href={l.href}
                   className="text-sm text-gray-400 hover:text-tox transition-colors"
                   onClick={e => { e.preventDefault(); onNav(l.href); }}>
                  {l.label}
                </a>
              ))}
            </div>
          </div>
        </nav>
      );
    }

    function Hero() {
      return (
        <section className="min-h-screen flex items-center justify-center relative overflow-hidden px-6 pt-16">
          <div className="absolute inset-0 opacity-[0.03]" style={{
            backgroundImage: `radial-gradient(circle at 25% 50%, #6ee7b7 0%, transparent 50%), radial-gradient(circle at 75% 50%, #10b981 0%, transparent 50%)`
          }} />
          <div className="max-w-4xl mx-auto text-center relative">
            <div className="inline-flex items-center gap-2 px-4 py-2 rounded-full bg-dark-700/50 border border-dark-500/30 text-sm text-gray-400 mb-8">
              <span className="w-2 h-2 rounded-full bg-green-400 pulse-dot" />
              Chiffrement de bout en bout
            </div>
            <h1 className="text-5xl md:text-7xl font-extrabold leading-tight mb-6 tracking-tight">
              <span className="gradient-text">Tox Bridge</span>
              <br />
              <span className="text-gray-300">Ta vie privée</span>
              <br />
              <span className="text-gray-300">ne regarde personne</span>
            </h1>
            <p className="text-lg md:text-xl text-gray-400 max-w-2xl mx-auto mb-10 leading-relaxed">
              Un pont entre Telegram et le réseau Tox. 
              Chiffrement fort, aucun serveur central, aucune surveillance.
              Discute sans intermédiaire, sans logs, sans compromis.
            </p>
            <div className="flex flex-col sm:flex-row items-center justify-center gap-4">
              <a href="#why"
                 onClick={e => { e.preventDefault(); document.querySelector('#why').scrollIntoView({ behavior: 'smooth' }); }}
                 className="px-8 py-3.5 rounded-xl bg-gradient-to-r from-emerald-500 to-green-600 text-white font-semibold shadow-lg shadow-emerald-500/20 hover:shadow-emerald-500/40 transition-all hover:scale-105">
                Comprendre
              </a>
              <a href="#how"
                 onClick={e => { e.preventDefault(); document.querySelector('#how').scrollIntoView({ behavior: 'smooth' }); }}
                 className="px-8 py-3.5 rounded-xl border border-dark-400/50 text-gray-300 font-semibold hover:border-tox/50 hover:text-tox transition-all">
                Comment ça marche
              </a>
            </div>
          </div>
        </section>
      );
    }

    function WhySection() {
      return (
        <section id="why" className="py-24 px-6 gradient-bg">
          <div className="max-w-6xl mx-auto">
            <div className="text-center mb-16 fade-in">
              <h2 className="text-3xl md:text-5xl font-bold mb-6">
                <span className="gradient-text">Pourquoi</span> ce bot existe
              </h2>
              <p className="text-gray-400 text-lg max-w-3xl mx-auto">
                En 2026, la surveillance de masse n'est plus une théorie. 
                Les gouvernements, les FAI, les plateformes — tout le monde écoute.
              </p>
            </div>

            <div className="grid md:grid-cols-3 gap-8 mb-16">
              {[
                { emoji: '👁️', title: 'Surveillance de masse', desc: 'En France, la loi Renseignement permet l\'interception massive des communications sans contrôle judiciaire réel. Vos messages sur WhatsApp, Messenger, Telegram (sans chiffrement de bout en bout réel) peuvent être lus.' },
                { emoji: '🔓', title: 'Les applis ne protègent pas', desc: 'La plupart des applications de messagerie stockent vos conversations sur leurs serveurs. Même "chiffré", le service conserve les métadonnées : qui parle à qui, quand, combien de temps.' },
                { emoji: '🏛️', title: 'La répression numérique', desc: 'Les États utilisent ces données pour réprimer les voix dissidentes, les militants, les journalistes. Chaque message est une preuve potentielle contre vous.' },
              ].map((item, i) => (
                <div key={i} className="p-8 rounded-2xl bg-dark-700/40 border border-dark-600/30 card-hover fade-in"
                     style={{ animationDelay: `${i * 0.1}s` }}>
                  <div className="text-4xl mb-4">{item.emoji}</div>
                  <h3 className="text-xl font-semibold mb-3 text-white">{item.title}</h3>
                  <p className="text-gray-400 leading-relaxed">{item.desc}</p>
                </div>
              ))}
            </div>

            <div className="max-w-4xl mx-auto p-8 rounded-2xl bg-dark-700/60 border border-dark-600/30 fade-in">
              <blockquote className="text-lg text-gray-300 italic leading-relaxed">
                "Tox Bridge fait communiquer Telegram au protocole Tox : 
                un réseau P2P chiffré de bout en bout, sans serveur central, 
                sans possibilité d'interception. Chaque message est chiffré 
                directement entre vous et votre interlocuteur — personne d'autre 
                ne peut le lire, pas même le logiciel."
              </blockquote>
              <div className="mt-4 flex items-center gap-3 text-sm text-gray-500">
                <span className="w-8 h-0.5 bg-dark-400" />
                Aucun log, aucune metadata, aucune compromission
              </div>
            </div>
          </div>
        </section>
      );
    }

    function HowSection() {
      const steps = [
        { icon: '🤖', title: '1. Lance le bot sur Telegram', desc: 'Ajoute @pursiveBot et envoie /start. Le bot crée ton identité Tox unique.' },
        { icon: '🔑', title: '2. Récupère ton adresse Tox', desc: 'Utilise /myid pour obtenir ton adresse Tox (76 caractères). Partage-la avec qui tu veux.' },
        { icon: '👥', title: '3. Ajoute des contacts', desc: 'Avec /add suivi de l\'adresse Tox d\'un ami, tu lui envoies une demande de contact.' },
        { icon: '✅', title: '4. Accepte les demandes', desc: 'Quand quelqu\'un t\'ajoute, tu reçois une notification. Accepte ou refuse avec /accept ou /reject.' },
        { icon: '💬', title: '5. Discute en privé', desc: 'Sélectionne un contact (/select) puis envoie-lui un message. Il est chiffré de bout en bout, personne ne peut l\'intercepter.' },
      ];

      return (
        <section id="how" className="py-24 px-6">
          <div className="max-w-4xl mx-auto">
            <div className="text-center mb-16 fade-in">
              <h2 className="text-3xl md:text-5xl font-bold mb-6">
                Comment ça <span className="gradient-text">marche</span>
              </h2>
              <p className="text-gray-400 text-lg">
                Un pont entre deux mondes : le confort de Telegram + la sécurité de Tox
              </p>
            </div>

            <div className="relative">
              {steps.map((step, i) => (
                <div key={i} className="flex gap-6 mb-12 relative fade-in" style={{ animationDelay: `${i * 0.1}s` }}>
                  <div className="flex-shrink-0 w-10 h-10 rounded-xl bg-dark-700 border border-dark-500/40 flex items-center justify-center text-xl relative z-10">
                    {step.icon}
                  </div>
                  {i < steps.length - 1 && <div className="step-line" />}
                  <div className="flex-1 pb-4">
                    <h3 className="text-xl font-semibold text-white mb-2">{step.title}</h3>
                    <p className="text-gray-400 leading-relaxed">{step.desc}</p>
                  </div>
                </div>
              ))}
            </div>

            <div className="mt-16 p-8 rounded-2xl bg-dark-700/40 border border-dark-600/30 text-center fade-in">
              <div className="text-4xl mb-4">🔄</div>
              <h3 className="text-xl font-semibold text-white mb-3">Architecture</h3>
              <div className="flex flex-col md:flex-row items-center justify-center gap-4 text-sm text-gray-400">
                <span className="px-4 py-2 rounded-lg bg-dark-600/50">📱 Telegram</span>
                <span className="text-tox text-2xl">⟷</span>
                <span className="px-4 py-2 rounded-lg bg-emerald-900/30 border border-emerald-700/30 text-emerald-300 font-medium">🤖 Tox Bridge</span>
                <span className="text-tox text-2xl">⟷</span>
                <span className="px-4 py-2 rounded-lg bg-dark-600/50">🌐 Réseau Tox (P2P)</span>
                <span className="text-tox text-2xl">⟷</span>
                <span className="px-4 py-2 rounded-lg bg-dark-600/50">👤 Contact Tox</span>
              </div>
              <p className="text-gray-500 text-sm mt-4">
                Tox utilise le réseau DHT — il n'y a pas de serveur central. 
                Chaque message est chiffré avec la clé publique du destinataire. 
                Seul le destinataire peut le déchiffrer avec sa clé privée.
              </p>
            </div>
          </div>
        </section>
      );
    }

    function FeaturesSection() {
      const features = [
        { icon: '🛡️', title: 'Chiffrement de bout en bout', desc: 'AES-256 + NaCl. Même le bot ne peut pas lire tes messages.' },
        { icon: '👤', title: 'Identité unique par utilisateur', desc: 'Chaque compte Telegram a sa propre identité Tox. Personne ne partage tes clés.' },
        { icon: '🌍', title: 'Aucun serveur central', desc: 'Tox est un réseau P2P décentralisé. Pas de point de défaillance unique.' },
        { icon: '📁', title: 'Données chiffrées', desc: 'La base de données locale est chiffrée avec AES-128 (Fernet). Mot de passe personnalisable.' },
        { icon: '📴', title: 'Pas de dépendance externe', desc: 'Pas de compte, pas d\'email, pas de numéro de téléphone requis. Juste une adresse Tox.' },
        { icon: '♻️', title: 'Persistant', desc: 'Ton identité, tes amis, tes pseudos sont sauvegardés entre chaque redémarrage.' },
        { icon: '🖥️', title: 'Auto-hébergé', desc: 'Tu contrôles le bot. Installe-le sur ton VPS, ton Raspberry Pi, ou ton PC.' },
        { icon: '🔌', title: 'Service systemd', desc: 'Le script de déploiement configure un service qui redémarre automatiquement.' },
      ];

      return (
        <section id="features" className="py-24 px-6 gradient-bg">
          <div className="max-w-6xl mx-auto">
            <div className="text-center mb-16 fade-in">
              <h2 className="text-3xl md:text-5xl font-bold mb-6">
                <span className="gradient-text">Fonctionnalités</span>
              </h2>
              <p className="text-gray-400 text-lg">Tout ce dont tu as besoin pour reprendre le contrôle</p>
            </div>
            <div className="grid sm:grid-cols-2 lg:grid-cols-4 gap-5">
              {features.map((f, i) => (
                <div key={i} className="p-6 rounded-xl bg-dark-700/40 border border-dark-600/30 card-hover fade-in"
                     style={{ animationDelay: `${i * 0.05}s` }}>
                  <div className="text-2xl mb-3">{f.icon}</div>
                  <h3 className="font-semibold text-white mb-2">{f.title}</h3>
                  <p className="text-sm text-gray-400 leading-relaxed">{f.desc}</p>
                </div>
              ))}
            </div>
          </div>
        </section>
      );
    }

    function CommandsSection() {
      const cmds = [
        { cmd: '/start', desc: 'Crée ton profil Tox' },
        { cmd: '/myid', desc: 'Affiche ton adresse Tox' },
        { cmd: '/setname &lt;nom&gt;', desc: 'Change ton pseudo' },
        { cmd: '/add &lt;adresse&gt;', desc: 'Ajoute un ami Tox' },
        { cmd: '/friends', desc: 'Liste tes amis' },
        { cmd: '/requests', desc: 'Voir les demandes en attente' },
        { cmd: '/accept &lt;pk&gt;', desc: 'Accepte une demande' },
        { cmd: '/reject &lt;pk&gt;', desc: 'Refuse une demande' },
        { cmd: '/select &lt;num&gt;', desc: 'Choisir un contact' },
        { cmd: '/remove &lt;num&gt;', desc: 'Supprime un ami' },
      ];

      return (
        <section className="py-24 px-6">
          <div className="max-w-4xl mx-auto">
            <div className="text-center mb-16 fade-in">
              <h2 className="text-3xl md:text-5xl font-bold mb-6">
                Commandes <span className="gradient-text">Telegram</span>
              </h2>
              <p className="text-gray-400 text-lg">Le bot se pilote comme un vrai client Tox</p>
            </div>
            <div className="grid sm:grid-cols-2 gap-3">
              {cmds.map((c, i) => (
                <div key={i} className="flex items-center gap-4 p-4 rounded-xl bg-dark-700/30 border border-dark-600/20 fade-in"
                     style={{ animationDelay: `${i * 0.03}s` }}>
                  <code className="font-mono text-sm text-emerald-400 bg-dark-800/50 px-3 py-1 rounded-lg whitespace-nowrap">{c.cmd}</code>
                  <span className="text-sm text-gray-400">{c.desc}</span>
                </div>
              ))}
            </div>
          </div>
        </section>
      );
    }

    function DeploySection() {
      return (
        <section id="deploy" className="py-24 px-6 gradient-bg">
          <div className="max-w-4xl mx-auto text-center fade-in">
            <div className="text-4xl mb-4">🚀</div>
            <h2 className="text-3xl md:text-5xl font-bold mb-6">
              Prêt à <span className="gradient-text">déployer</span> le tien ?
            </h2>
            <p className="text-gray-400 text-lg mb-10 max-w-2xl mx-auto">
              Le projet est open-source. Tu peux l\'héberger toi-même sur n\'importe quel VPS 
              ou machine Linux. Script de déploiement automatique inclus.
            </p>
            <div className="flex flex-col sm:flex-row items-center justify-center gap-4">
              <a href="https://github.com/anomalyco/opencode"
                 target="_blank" rel="noopener noreferrer"
                 className="px-8 py-3.5 rounded-xl bg-gradient-to-r from-emerald-500 to-green-600 text-white font-semibold shadow-lg shadow-emerald-500/20 hover:shadow-emerald-500/40 transition-all hover:scale-105">
                Télécharger
              </a>
              <div className="px-8 py-3.5 rounded-xl border border-dark-400/50 text-gray-400 text-sm font-mono">
                bash deploy.sh
              </div>
            </div>
          </div>
        </section>
      );
    }

    function Footer() {
      return (
        <footer className="py-12 px-6 border-t border-dark-600/20">
          <div className="max-w-6xl mx-auto flex flex-col md:flex-row items-center justify-between gap-4">
            <div className="text-sm text-gray-500">
              <span className="text-tox">⎔</span> Tox Bridge —{' '}
              <span className="text-gray-600">Aucune donnée collectée. Aucun log. Aucune compromission.</span>
            </div>
            <div className="flex items-center gap-6 text-sm text-gray-600">
              <span>Fait avec ❤️ pour la liberté</span>
            </div>
          </div>
        </footer>
      );
    }

    // ---------- App ----------

    function App() {
      const handleNav = (href) => {
        const el = document.querySelector(href);
        if (el) el.scrollIntoView({ behavior: 'smooth' });
      };

      return (
        <div>
          <Nav onNav={handleNav} />
          <Hero />
          <WhySection />
          <HowSection />
          <FeaturesSection />
          <CommandsSection />
          <DeploySection />
          <Footer />
        </div>
      );
    }

    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(<App />);
  </script>
</body>
</html>
